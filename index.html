<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynasty Payouts</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ── PAYOUT RULES — edit these ── */
:root {
  --payout-win: 1;
  --payout-bracket: 5;
  --payout-overall: 5;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080b0f;
  --surface: #0f1318;
  --card: #141920;
  --border: #1c2330;
  --gold: #e8b84b;
  --gold2: #a07828;
  --green: #3ecf7a;
  --red: #e05a5a;
  --muted: #3a4555;
  --text: #dde4ee;
  --sub: #6b7a90;
  --font-display: 'Bebas Neue', serif;
  --font-mono: 'DM Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
}

body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: flex; }

/* LOGIN */
#screen-login {
  min-height: 100vh;
  align-items: center;
  justify-content: center;
  padding: 24px;
  flex-direction: column;
}

.login-box {
  width: 100%;
  max-width: 400px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
}

.logo { font-family: var(--font-display); font-size: 3rem; color: var(--gold); letter-spacing: 4px; text-align: center; line-height: 1; margin-bottom: 4px; }
.logo-sub { font-family: var(--font-mono); font-size: 0.65rem; color: var(--sub); letter-spacing: 4px; text-transform: uppercase; text-align: center; margin-bottom: 36px; }

.field-label { font-family: var(--font-mono); font-size: 0.68rem; color: var(--sub); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
input[type=text] {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font-mono); font-size: 0.95rem;
  padding: 12px 14px; border-radius: 6px; outline: none; margin-bottom: 14px;
  transition: border-color 0.2s;
}
input[type=text]:focus { border-color: var(--gold2); }

.btn-primary {
  width: 100%; background: var(--gold); color: #000; border: none;
  border-radius: 6px; padding: 13px; font-family: var(--font-display);
  font-size: 1.1rem; letter-spacing: 2px; cursor: pointer;
  transition: background 0.2s;
}
.btn-primary:hover { background: var(--gold2); color: #fff; }
.btn-primary:disabled { background: var(--muted); color: var(--sub); cursor: not-allowed; }

.error-msg { color: var(--red); font-family: var(--font-mono); font-size: 0.72rem; margin-top: 8px; }

/* LEAGUES */
#screen-leagues {
  min-height: 100vh;
  flex-direction: column;
  padding: 32px 16px;
}

.page-wrap { max-width: 600px; margin: 0 auto; width: 100%; }
.page-wrap-wide { max-width: 820px; margin: 0 auto; width: 100%; }

.back-btn {
  background: none; border: none; color: var(--sub);
  font-family: var(--font-mono); font-size: 0.68rem;
  cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 24px; padding: 0;
}
.back-btn:hover { color: var(--gold); }

.page-title { font-family: var(--font-display); font-size: 2.2rem; color: var(--gold); letter-spacing: 2px; margin-bottom: 4px; }
.page-subtitle { font-family: var(--font-mono); font-size: 0.68rem; color: var(--sub); margin-bottom: 28px; letter-spacing: 1px; }

.league-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px 20px; margin-bottom: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  transition: border-color 0.15s, background 0.15s;
}
.league-card:hover { border-color: var(--gold2); background: var(--card); }
.league-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 3px; }
.league-meta { font-family: var(--font-mono); font-size: 0.65rem; color: var(--sub); }
.league-arrow { color: var(--gold2); font-size: 1.1rem; }

/* DASHBOARD */
#screen-dashboard {
  min-height: 100vh;
  flex-direction: column;
  padding: 24px 16px 60px;
}

.dash-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  padding-bottom: 16px; border-bottom: 1px solid var(--border); margin-bottom: 20px;
}
.dash-title { font-family: var(--font-display); font-size: clamp(1.8rem, 4vw, 2.8rem); color: var(--gold); letter-spacing: 2px; line-height: 1; }
.dash-league { font-family: var(--font-mono); font-size: 0.68rem; color: var(--sub); margin-top: 4px; }

.tab-bar { display: flex; gap: 4px; margin-bottom: 20px; }
.tab {
  background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
  padding: 7px 14px; font-family: var(--font-mono); font-size: 0.68rem;
  color: var(--sub); cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
  transition: all 0.15s;
}
.tab:hover { border-color: var(--gold2); color: var(--text); }
.tab.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 700; }

/* Week selector */
.week-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.week-nav label { font-family: var(--font-mono); font-size: 0.68rem; color: var(--sub); text-transform: uppercase; letter-spacing: 1px; }
select {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  font-family: var(--font-mono); font-size: 0.8rem; padding: 6px 10px;
  border-radius: 4px; cursor: pointer; outline: none;
}
select:focus { border-color: var(--gold2); }

/* Legend */
.legend { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.legend-item {
  background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
  padding: 4px 10px; font-family: var(--font-mono); font-size: 0.62rem; color: var(--sub);
  display: flex; align-items: center; gap: 5px;
}
.dot { width: 7px; height: 7px; border-radius: 50%; }

/* Section label */
.section-label {
  font-family: var(--font-mono); font-size: 0.62rem; color: var(--muted);
  letter-spacing: 3px; text-transform: uppercase;
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px; margin-top: 24px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* Matchup card */
.matchup-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  margin-bottom: 6px; padding: 12px 14px;
}
.matchup-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; }
.team-name-m { font-weight: 700; font-size: 0.83rem; margin-bottom: 2px; }
.team-owner-m { font-family: var(--font-mono); font-size: 0.62rem; color: var(--sub); margin-bottom: 5px; }
.team-right { text-align: right; }
.scores-center { text-align: center; min-width: 120px; }
.score-pair { display: flex; align-items: center; gap: 8px; justify-content: center; }
.score-val { font-family: var(--font-display); font-size: 1.4rem; }
.score-vs { font-family: var(--font-mono); font-size: 0.58rem; color: var(--muted); }
.score-win { color: var(--green); }
.score-lose { color: var(--muted); }

/* Badges */
.badges { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 3px; }
.badges.right { justify-content: flex-end; }
.badge {
  display: inline-block; font-size: 0.55rem; padding: 2px 7px;
  border-radius: 99px; font-family: var(--font-mono); font-weight: 700;
  letter-spacing: 0.8px; text-transform: uppercase;
}
.badge-win { color: var(--green); background: rgba(62,207,122,0.1); border: 1px solid rgba(62,207,122,0.3); }
.badge-bracket { color: var(--gold); background: rgba(232,184,75,0.12); border: 1px solid rgba(232,184,75,0.3); }
.badge-overall { color: var(--gold); background: rgba(232,184,75,0.22); border: 1px solid var(--gold2); }

/* Payout table */
.payout-table { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; margin-top: 8px; }
.table-header, .table-row {
  display: grid;
  grid-template-columns: 28px 1fr 52px 72px 64px 58px;
  gap: 8px; padding: 9px 16px; align-items: center;
}
.table-header {
  background: #0a0d12; border-bottom: 1px solid var(--border);
  font-family: var(--font-mono); font-size: 0.58rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px;
}
.table-row { border-bottom: 1px solid var(--border); }
.table-row:last-child { border-bottom: none; }
.cell-right { text-align: right; }
.rank { font-family: var(--font-display); font-size: 1rem; color: var(--muted); }
.rank-1 { color: var(--gold); }
.rank-2 { color: #aab0bb; }
.rank-3 { color: #b07040; }
.p-name { font-weight: 700; font-size: 0.82rem; }
.p-owner { font-family: var(--font-mono); font-size: 0.62rem; color: var(--sub); }
.p-cell { font-family: var(--font-mono); font-size: 0.75rem; text-align: right; color: var(--muted); }
.p-cell.earned-green { color: var(--green); }
.p-cell.earned-gold { color: var(--gold); }
.p-total { font-family: var(--font-display); font-size: 1.1rem; text-align: right; color: var(--muted); }
.p-total.has-money { color: var(--gold); }

/* Season view */
.season-table { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; overflow-x: auto; margin-top: 8px; }
.season-header { display: flex; background: #0a0d12; border-bottom: 1px solid var(--border); }
.season-row { display: flex; border-bottom: 1px solid var(--border); }
.season-row:last-child { border-bottom: none; }
.s-cell {
  font-family: var(--font-mono); font-size: 0.65rem; padding: 8px 10px;
  min-width: 52px; text-align: center; flex-shrink: 0; color: var(--sub);
}
.s-cell.team-col { min-width: 140px; text-align: left; font-family: var(--font-body); }
.s-cell.total-col { min-width: 60px; font-family: var(--font-display); font-size: 0.9rem; color: var(--gold); }
.s-cell.header { color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-size: 0.6rem; }
.s-cell.money { color: var(--green); }
.s-cell.no-money { color: var(--muted); }

/* Loading overlay */
#loading-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(8,11,15,0.88); z-index: 999;
  flex-direction: column; align-items: center; justify-content: center;
}
#loading-overlay.show { display: flex; }
.spinner {
  width: 34px; height: 34px;
  border: 2px solid var(--border); border-top-color: var(--gold);
  border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 14px;
}
.loading-text { font-family: var(--font-mono); font-size: 0.72rem; color: var(--sub); letter-spacing: 1px; }
@keyframes spin { to { transform: rotate(360deg); } }

.small-btn {
  background: none; border: 1px solid var(--border); color: var(--sub);
  font-family: var(--font-mono); font-size: 0.65rem; padding: 6px 12px;
  border-radius: 4px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
  transition: all 0.15s;
}
.small-btn:hover { border-color: var(--gold2); color: var(--gold); }
</style>
</head>
<body>

<!-- LOADING OVERLAY -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Loading...</div>
</div>

<!-- ── SCREEN: LOGIN ── -->
<div id="screen-login" class="screen active">
  <div class="login-box">
    <div class="logo">DYNASTY</div>
    <div class="logo-sub">Payout Dashboard</div>
    <div class="field-label">Sleeper Username</div>
    <input type="text" id="username-input" placeholder="your username" />
    <div id="login-error" class="error-msg" style="display:none"></div>
    <button class="btn-primary" id="login-btn" onclick="handleLogin()">Find My Leagues →</button>
  </div>
</div>

<!-- ── SCREEN: LEAGUES ── -->
<div id="screen-leagues" class="screen">
  <div class="page-wrap">
    <button class="back-btn" onclick="showScreen('login')">← Back</button>
    <div class="page-title">Your Leagues</div>
    <div class="page-subtitle" id="leagues-subtitle"></div>
    <div id="leagues-list"></div>
  </div>
</div>

<!-- ── SCREEN: DASHBOARD ── -->
<div id="screen-dashboard" class="screen">
  <div class="page-wrap-wide">
    <div class="dash-header">
      <div>
        <div class="dash-title">Dynasty Payouts</div>
        <div class="dash-league" id="dash-league-name"></div>
      </div>
      <button class="small-btn" onclick="showScreen('leagues')">← Leagues</button>
    </div>

    <div class="tab-bar">
      <div class="tab active" id="tab-season" onclick="switchTab('season')">Season</div>
      <div class="tab" id="tab-week" onclick="switchTab('week')">Week</div>
    </div>

    <!-- SEASON VIEW -->
    <div id="view-season">
      <div style="font-family:var(--font-mono);font-size:0.68rem;color:var(--sub);margin-bottom:14px;">
        Cumulative payouts across all loaded weeks. Load more weeks below.
      </div>
      <div class="season-table" id="season-table"></div>
      <div style="margin-top:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <span style="font-family:var(--font-mono);font-size:0.68rem;color:var(--sub);">Load week:</span>
        <select id="season-week-select"></select>
        <button class="small-btn" onclick="loadAdditionalWeek()">+ Load Week</button>
        <span id="loaded-weeks-label" style="font-family:var(--font-mono);font-size:0.65rem;color:var(--muted);margin-left:4px;"></span>
      </div>
    </div>

    <!-- WEEK VIEW -->
    <div id="view-week" style="display:none">
      <div class="week-nav">
        <label>Week</label>
        <select id="week-select" onchange="switchWeek(this.value)"></select>
        <div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;">
          <div class="legend-item"><div class="dot" style="background:var(--green)"></div> Win $<span id="l-win"></span></div>
          <div class="legend-item"><div class="dot" style="background:var(--gold)"></div> Bracket $<span id="l-bracket"></span></div>
          <div class="legend-item"><div class="dot" style="background:var(--gold);box-shadow:0 0 5px var(--gold)"></div> Overall $<span id="l-overall"></span></div>
        </div>
      </div>
      <div id="brackets-container"></div>
      <div class="section-label" style="margin-top:30px">Payout Summary</div>
      <div class="payout-table">
        <div class="table-header">
          <div>#</div><div>Team</div>
          <div class="cell-right">Win</div><div class="cell-right">Bracket</div>
          <div class="cell-right">Overall</div><div class="cell-right">Total</div>
        </div>
        <div id="payout-rows"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──
// IMPORTANT: Replace this with your actual Railway backend URL after deploying
const BACKEND = "REPLACE_WITH_YOUR_RAILWAY_URL";

const PAYOUTS = { win: 1, bracket: 5, overall: 5 };
const REGULAR_WEEKS = 13;

// ── STATE ──
let state = {
  userId: null, username: null,
  selectedLeague: null,
  rosters: {},       // roster_id -> {team_name, owner_name}
  weekData: {},      // week -> matchup[]
  currentWeek: 1,
  loadedWeeks: [],
};

// ── UTILS ──
function api(path) {
  return fetch(BACKEND + path).then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  });
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function setLoading(show, msg = "Loading...") {
  const el = document.getElementById('loading-overlay');
  el.classList.toggle('show', show);
  document.getElementById('loading-text').textContent = msg;
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
}

function hideError(id) { document.getElementById(id).style.display = 'none'; }

// ── LOGIN ──
document.getElementById('username-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});

async function handleLogin() {
  const username = document.getElementById('username-input').value.trim();
  if (!username) return;
  hideError('login-error');
  setLoading(true, 'Looking up user...');
  try {
    const user = await api(`/user/${username}`);
    if (!user?.user_id) throw new Error('User not found');
    state.userId = user.user_id;
    state.username = user.display_name || username;
    setLoading(true, 'Fetching leagues...');
    const leagues = await api(`/leagues/${user.user_id}`);
    renderLeagues(leagues || []);
    showScreen('leagues');
  } catch (e) {
    showError('login-error', 'Could not find that username. Check the spelling and try again.');
  }
  setLoading(false);
}

// ── LEAGUES ──
function renderLeagues(leagues) {
  document.getElementById('leagues-subtitle').textContent =
    `${state.username} · 2025 NFL Season · ${leagues.length} league${leagues.length !== 1 ? 's' : ''} found`;
  const list = document.getElementById('leagues-list');
  list.innerHTML = '';
  if (!leagues.length) {
    list.innerHTML = '<div style="color:var(--sub);font-family:var(--font-mono);font-size:0.8rem">No leagues found.</div>';
    return;
  }
  leagues.forEach(lg => {
    const type = lg.settings?.type === 2 ? 'Dynasty' : lg.settings?.type === 1 ? 'Keeper' : 'Redraft';
    const card = document.createElement('div');
    card.className = 'league-card';
    card.innerHTML = `
      <div>
        <div class="league-name">${lg.name}</div>
        <div class="league-meta">${lg.total_rosters} teams · ${type}</div>
      </div>
      <div class="league-arrow">→</div>`;
    card.onclick = () => loadLeague(lg);
    list.appendChild(card);
  });
}

// ── LOAD LEAGUE ──
async function loadLeague(league) {
  state.selectedLeague = league;
  state.weekData = {};
  state.loadedWeeks = [];
  setLoading(true, 'Loading rosters...');
  try {
    const [rosterList, users, info] = await Promise.all([
      api(`/league/${league.league_id}/rosters`),
      api(`/league/${league.league_id}/users`),
      api(`/league/${league.league_id}/info`),
    ]);
    const usersMap = {};
    (users || []).forEach(u => { usersMap[u.user_id] = u; });
    state.rosters = {};
    (rosterList || []).forEach(r => {
      const u = usersMap[r.owner_id] || {};
      state.rosters[r.roster_id] = {
        team_name: u.metadata?.team_name || u.display_name || `Team ${r.roster_id}`,
        owner_name: u.display_name || 'Unknown',
      };
    });
    state.currentWeek = Math.min(info?.settings?.leg || 1, REGULAR_WEEKS);
    document.getElementById('dash-league-name').textContent = league.name;
    document.getElementById('l-win').textContent = PAYOUTS.win;
    document.getElementById('l-bracket').textContent = PAYOUTS.bracket;
    document.getElementById('l-overall').textContent = PAYOUTS.overall;
    buildWeekSelectors();
    setLoading(true, `Loading week ${state.currentWeek}...`);
    await loadWeek(state.currentWeek);
    renderSeasonTable();
    renderWeekView(state.currentWeek);
    showScreen('dashboard');
    switchTab('season');
  } catch (e) {
    alert('Failed to load league. Please try again.');
  }
  setLoading(false);
}

function buildWeekSelectors() {
  ['week-select', 'season-week-select'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '';
    for (let w = 1; w <= REGULAR_WEEKS; w++) {
      const o = document.createElement('option');
      o.value = w; o.textContent = `Week ${w}`;
      if (w === state.currentWeek) o.selected = true;
      sel.appendChild(o);
    }
  });
}

// ── LOAD WEEK DATA ──
async function loadWeek(week) {
  if (state.weekData[week]) return; // already loaded
  const data = await api(`/league/${state.selectedLeague.league_id}/matchups/${week}`);
  state.weekData[week] = data || [];
  if (!state.loadedWeeks.includes(week)) state.loadedWeeks.push(week);
  state.loadedWeeks.sort((a, b) => a - b);
}

async function loadAdditionalWeek() {
  const week = parseInt(document.getElementById('season-week-select').value);
  setLoading(true, `Loading week ${week}...`);
  try {
    await loadWeek(week);
    renderSeasonTable();
    document.getElementById('week-select').value = week;
    renderWeekView(week);
  } catch (e) { alert('Failed to load that week.'); }
  setLoading(false);
}

async function switchWeek(week) {
  week = parseInt(week);
  if (!state.weekData[week]) {
    setLoading(true, `Loading week ${week}...`);
    try { await loadWeek(week); } catch {}
    setLoading(false);
  }
  renderWeekView(week);
}

// ── COMPUTE PAYOUTS ──
function computeWeek(matchups) {
  const groups = {};
  matchups.forEach(m => {
    if (!groups[m.matchup_id]) groups[m.matchup_id] = [];
    groups[m.matchup_id].push(m);
  });
  const ids = Object.keys(groups).map(Number).sort((a, b) => a - b);
  const half = Math.ceil(ids.length / 2);
  const b1 = new Set(ids.slice(0, half));
  const b2 = new Set(ids.slice(half));
  const pay = {};
  matchups.forEach(m => { pay[m.roster_id] = { win: 0, bracket: 0, overall: 0 }; });

  Object.values(groups).forEach(pair => {
    if (pair.length !== 2) return;
    const winner = (pair[0].points || 0) >= (pair[1].points || 0) ? pair[0] : pair[1];
    pay[winner.roster_id].win += PAYOUTS.win;
  });

  [b1, b2].forEach(bids => {
    const teams = matchups.filter(m => bids.has(m.matchup_id));
    if (!teams.length) return;
    const top = teams.reduce((best, t) => (t.points || 0) > (best.points || 0) ? t : best);
    pay[top.roster_id].bracket += PAYOUTS.bracket;
  });

  const overall = matchups.reduce((best, t) =>
    (t.points || 0) > (best.points || 0) ? t : best, { roster_id: -1, points: -1 });
  if (pay[overall.roster_id]) pay[overall.roster_id].overall += PAYOUTS.overall;

  const bTop = bids => {
    const teams = matchups.filter(m => bids.has(m.matchup_id));
    if (!teams.length) return -1;
    return teams.reduce((best, t) => (t.points || 0) > (best.points || 0) ? t : best).roster_id;
  };

  return { groups, b1, b2, pay, overallWinner: overall.roster_id, b1Top: bTop(b1), b2Top: bTop(b2) };
}

// ── SEASON TABLE ──
function renderSeasonTable() {
  const weeks = state.loadedWeeks;
  document.getElementById('loaded-weeks-label').textContent =
    weeks.length ? `Loaded: Wk ${weeks.join(', ')}` : '';

  // Accumulate totals
  const totals = {}; // roster_id -> { weeks: {w: $}, total: $ }
  Object.keys(state.rosters).forEach(rid => { totals[rid] = { weeks: {}, total: 0 }; });

  weeks.forEach(w => {
    const { pay } = computeWeek(state.weekData[w]);
    Object.entries(pay).forEach(([rid, p]) => {
      const amt = p.win + p.bracket + p.overall;
      totals[rid].weeks[w] = amt;
      totals[rid].total += amt;
    });
  });

  const sorted = Object.keys(state.rosters).sort((a, b) => totals[b].total - totals[a].total);

  const table = document.getElementById('season-table');
  table.innerHTML = '';

  // Header
  const header = document.createElement('div');
  header.className = 'season-header';
  header.innerHTML = `<div class="s-cell team-col header">Team</div>` +
    weeks.map(w => `<div class="s-cell header">Wk ${w}</div>`).join('') +
    `<div class="s-cell total-col header">Total</div>`;
  table.appendChild(header);

  sorted.forEach((rid, i) => {
    const team = state.rosters[rid] || { team_name: `Roster ${rid}`, owner_name: '' };
    const row = document.createElement('div');
    row.className = 'season-row';
    const weekCells = weeks.map(w => {
      const amt = totals[rid].weeks[w] || 0;
      return `<div class="s-cell ${amt > 0 ? 'money' : 'no-money'}">${amt > 0 ? '$' + amt : '—'}</div>`;
    }).join('');
    const total = totals[rid].total;
    row.innerHTML = `
      <div class="s-cell team-col">
        <div style="font-weight:700;font-size:0.82rem">${team.team_name}</div>
        <div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--sub)">${team.owner_name}</div>
      </div>
      ${weekCells}
      <div class="s-cell total-col">${total > 0 ? '$' + total : '—'}</div>`;
    table.appendChild(row);
  });
}

// ── WEEK VIEW ──
function renderWeekView(week) {
  const matchups = state.weekData[week];
  if (!matchups || !matchups.length) return;
  const { groups, b1, b2, pay, overallWinner, b1Top, b2Top } = computeWeek(matchups);

  // Brackets
  const container = document.getElementById('brackets-container');
  container.innerHTML = '';
  [['Bracket 1', b1, b1Top], ['Bracket 2', b2, b2Top]].forEach(([label, bids, topId]) => {
    const sec = document.createElement('div');
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = label;
    sec.appendChild(lbl);
    [...bids].sort((a, b) => a - b).forEach(mid => {
      const pair = groups[mid];
      if (!pair || pair.length !== 2) return;
      const [a, b] = pair;
      const aScore = a.points || 0, bScore = b.points || 0, aWin = aScore >= bScore;
      const ra = state.rosters[a.roster_id] || { team_name: `Roster ${a.roster_id}`, owner_name: '' };
      const rb = state.rosters[b.roster_id] || { team_name: `Roster ${b.roster_id}`, owner_name: '' };
      const badgesA = [
        aWin ? `<span class="badge badge-win">$${PAYOUTS.win} Win</span>` : '',
        a.roster_id === topId ? `<span class="badge badge-bracket">$${PAYOUTS.bracket} Bracket</span>` : '',
        a.roster_id === overallWinner ? `<span class="badge badge-overall">$${PAYOUTS.overall} Overall</span>` : '',
      ].filter(Boolean).join('');
      const badgesB = [
        !aWin ? `<span class="badge badge-win">$${PAYOUTS.win} Win</span>` : '',
        b.roster_id === topId ? `<span class="badge badge-bracket">$${PAYOUTS.bracket} Bracket</span>` : '',
        b.roster_id === overallWinner ? `<span class="badge badge-overall">$${PAYOUTS.overall} Overall</span>` : '',
      ].filter(Boolean).join('');
      const card = document.createElement('div');
      card.className = 'matchup-card';
      card.innerHTML = `
        <div class="matchup-grid">
          <div>
            <div class="team-name-m">${ra.team_name}</div>
            <div class="team-owner-m">${ra.owner_name}</div>
            <div class="badges">${badgesA}</div>
          </div>
          <div class="scores-center">
            <div class="score-pair">
              <span class="score-val ${aWin ? 'score-win' : 'score-lose'}">${aScore.toFixed(2)}</span>
              <span class="score-vs">vs</span>
              <span class="score-val ${!aWin ? 'score-win' : 'score-lose'}">${bScore.toFixed(2)}</span>
            </div>
          </div>
          <div class="team-right">
            <div class="team-name-m">${rb.team_name}</div>
            <div class="team-owner-m">${rb.owner_name}</div>
            <div class="badges right">${badgesB}</div>
          </div>
        </div>`;
      sec.appendChild(card);
    });
    container.appendChild(sec);
  });

  // Payout rows
  const rows = Object.entries(pay)
    .map(([rid, p]) => ({ rid: Number(rid), team: state.rosters[rid] || { team_name: `Roster ${rid}`, owner_name: '' }, ...p, total: p.win + p.bracket + p.overall }))
    .sort((a, b) => b.total - a.total || b.win - a.win);

  const payoutContainer = document.getElementById('payout-rows');
  payoutContainer.innerHTML = '';
  rows.forEach((r, i) => {
    const div = document.createElement('div');
    div.className = 'table-row';
    div.innerHTML = `
      <div class="rank ${i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : ''}">${i + 1}</div>
      <div><div class="p-name">${r.team.team_name}</div><div class="p-owner">${r.team.owner_name}</div></div>
      <div class="p-cell ${r.win > 0 ? 'earned-green' : ''}">$${r.win}</div>
      <div class="p-cell ${r.bracket > 0 ? 'earned-gold' : ''}">$${r.bracket}</div>
      <div class="p-cell ${r.overall > 0 ? 'earned-gold' : ''}">$${r.overall}</div>
      <div class="p-total ${r.total > 0 ? 'has-money' : ''}">$${r.total}</div>`;
    payoutContainer.appendChild(div);
  });
}

// ── TABS ──
function switchTab(tab) {
  document.getElementById('tab-season').classList.toggle('active', tab === 'season');
  document.getElementById('tab-week').classList.toggle('active', tab === 'week');
  document.getElementById('view-season').style.display = tab === 'season' ? 'block' : 'none';
  document.getElementById('view-week').style.display = tab === 'week' ? 'block' : 'none';
  if (tab === 'week') renderWeekView(parseInt(document.getElementById('week-select').value));
}
</script>
